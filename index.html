<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="refresh" content="2;url=/onboarding.html">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Home Assistant - Starting</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #fafafa;
    color: #212121;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #111; color: #e1e1e1; }
  }
  .container { text-align: center; max-width: 400px; }
  .spinner {
    width: 40px; height: 40px;
    margin: 0 auto 24px;
    border: 3px solid #e0e0e0;
    border-top-color: #03a9f4;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  h1 { font-size: 24px; font-weight: 400; margin-bottom: 12px; }
  p { color: #666; }
  @media (prefers-color-scheme: dark) { p { color: #999; } }
  a { color: #03a9f4; }
</style>
</head>
<body>
<div class="container">
  <div class="spinner"></div>
  <h1>Starting Home Assistant</h1>
  <p>Redirecting to setup&hellip;</p>
  <p><small><a href="/onboarding.html">Click here if not redirected</a></small></p>
</div>
</body>
</html>
