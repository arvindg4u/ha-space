<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Home Assistant - Loading</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #fafafa;
    color: #212121;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #111; color: #e1e1e1; }
  }
  .container { text-align: center; max-width: 400px; }
  .logo { margin-bottom: 24px; }
  .logo svg { width: 64px; height: 64px; }
  h1 { font-size: 24px; font-weight: 400; margin-bottom: 12px; }
  p { color: #666; margin-bottom: 24px; }
  @media (prefers-color-scheme: dark) { p { color: #999; } }
  .spinner {
    width: 40px; height: 40px;
    margin: 0 auto 24px;
    border: 3px solid #e0e0e0;
    border-top-color: #03a9f4;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: #d32f2f; display: none; margin-top: 12px; font-size: 14px; }
  @media (prefers-color-scheme: dark) { .error { color: #ef5350; } }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="#03a9f4">
      <path d="M21.8 13.4l-1.4 1.4-2.8-2.8-2.8 2.8-1.4-1.4 2.8-2.8-2.8-2.8 1.4-1.4 2.8 2.8 2.8-2.8 1.4 1.4L19 10.6l2.8 2.8zM12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm0 18c-4.4 0-8-3.6-8-8s3.6-8 8-8 8 3.6 8 8-3.6 8-8 8z"/>
    </svg>
  </div>
  <div class="spinner"></div>
  <h1>Starting Home Assistant</h1>
  <p>Your smart home is waking up. Please wait...</p>
  <div class="error" id="error"></div>
</div>
<script>
(async function() {
  const MAX_RETRIES = 30;
  const RETRY_DELAY = 2000;
  
  for (let i = 0; i < MAX_RETRIES; i++) {
    try {
      const resp = await fetch('/api/onboarding', { credentials: 'same-origin' });
      if (resp.ok) {
        const steps = await resp.json();
        const allDone = steps.every(s => s.done === true);
        window.location.href = allDone ? '/lovelace/0' : '/onboarding.html';
        return;
      }
    } catch(e) {
      // HA not ready yet
    }
    await new Promise(r => setTimeout(r, RETRY_DELAY));
  }
  document.getElementById('error').style.display = 'block';
  document.getElementById('error').textContent = 'Home Assistant is taking longer than expected. Please refresh the page.';
})();
</script>
</body>
</html>
